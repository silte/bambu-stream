name: Validate Pull Request

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-pr_${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m compileall app.py stream_manager.py mqtt_probe.py

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./helm --dependency-update

  docker-build:
    needs:
      - validate-python
      - helm-lint
    uses: silte/actions/.github/workflows/build-docker-image.yml@v2
    with:
      DOCKER_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
      DOCKER_REPOSITORY: bambu-stream
      DOCKER_REGISTRY_USERNAME: ${{ github.repository_owner }}
      PUBLISH: false
      BUILD_CACHE: false
    secrets:
      DOCKER_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_TOKEN }}
