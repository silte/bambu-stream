name: Validate and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ci-build_main
  cancel-in-progress: true

jobs:
  validate-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m compileall app.py stream_manager.py mqtt_probe.py

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update Helm dependencies
        run: helm dependency update ./helm

      - name: Lint Helm chart
        run: helm lint ./helm

  docker-publish:
    needs:
      - validate-python
      - helm-lint
    uses: silte/actions/.github/workflows/build-docker-image.yml@v2
    with:
      DOCKER_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
      DOCKER_REPOSITORY: bambu-stream
      DOCKER_REGISTRY_USERNAME: ${{ github.repository_owner }}
    secrets:
      DOCKER_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_TOKEN }}

  deploy:
    needs:
      - docker-publish
    runs-on: ubuntu-latest
    steps:
      - name: Write KUBE_CONFIG to file
        run: |
          export KUBE_CONFIG_PATH=$(dirname ${{ github.workspace }})/kube_config.yaml
          echo "${{ secrets.DEPLOY_CONFIG }}" | base64 -d > $KUBE_CONFIG_PATH
          echo "KUBE_CONFIG_PATH=$KUBE_CONFIG_PATH" >> $GITHUB_ENV

      - name: Deploy
        uses: silte/bambu-stream/.github/actions/deploy@main
        with:
          RELEASE_NAME: bambu-stream
          KUBE_CONFIG: ${{ env.KUBE_CONFIG_PATH }}
          TIMEOUT: 300

      - name: Delete KUBE_CONFIG file
        run: rm ${{ env.KUBE_CONFIG_PATH }}
